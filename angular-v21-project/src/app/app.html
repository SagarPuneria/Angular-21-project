 * Data binding — interpolation, property binding, two-way data binding
 * Structural directives — @if, @for
 * Class binding & style binding
 * Parent & Child components — how to establish communication between them
 * Services — high-level introduction (deeper dive next session 4)
 * Component creation using Copilot prompts — created a component contextually without manually writing boilerplate
-->
<div class="app-container">
  <!-- Header -->
  <header class="app-header">
    <h1>🚀 Angular 21 - Data Binding & Components Demo</h1>
    <p>
      Comprehensive examples of interpolation, property binding, event binding, two-way binding, and
      lifecycle hooks
    </p>
  </header>
  <!-- Main Data Binding Demo Component -->
  <app-data-binding-demo></app-data-binding-demo>

  <!-- Copilot Prompt: Create a component called child , pass some data from app.html , and emit some data from child component -->
  <!-- Child Component Demo -->
  <section style="padding: 0 16px;">
    <h2>Parent → Child (@Input) & Child → Parent (@Output)</h2>
    <p><strong>Message received from Child:</strong> {{ messageFromChild || 'No message yet' }}</p>
    <app-child
      [parentMessage]="messageToChild"
      (childEvent)="onChildEvent($event)"
    />
  </section>

  <!-- Copilot Prompt: Create component called data-binding , that component reads data from service called employee , it will print the all employe data in table with good looking styles. -->
  <!-- Employee Data Binding Component -->
  <app-data-binding />

</div>
