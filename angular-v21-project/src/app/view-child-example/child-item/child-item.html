<div class="child-item-container">
  <h4>Child Component</h4>
  <p>{{ childMessage }}</p>
  <p>Counter: <strong>{{ counter }}</strong></p>
  <div class="btn-row">
    <button (click)="incrementCounter()">Increment in Child</button>
    <button (click)="resetCounter()">Reset in Child</button>
  </div>
</div>
